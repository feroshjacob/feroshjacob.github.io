self-learning-agent-based-retail-search:
  title: "Self-Learning Agent-Based Retail Search"
  description: "A series on building retail search with AI agents, Mission-Driven Engineering, measured experiments, and production-minded search relevance."
  permalink: "/series/self-learning-agent-based-retail-search/"
  category: "self-learning-agent-based-retail-search"
  image: "/images/self-learning-agent-based-retail-search-part-1.png"
  start_here: "Start with why retail search is harder than it looks, then follow the experiment as specialized agents work on query understanding, synonyms, normalization, indexing, ranking, and evaluation."
  phases_intro: "This project runs in phases, and the phases are the argument. Each one hands the agent a harder problem than the last — and nothing moves forward until the evidence says it should. Reading in phase order is the fastest way to understand what the project is actually claiming."
  phases:
    - key: "introduction"
      title: "Introduction"
      status: "Published"
      summary: "Why ranking in retail is a multi-objective problem before it is a relevance problem."
    - key: "phase-1"
      title: "Phase 1 — Cranfield Foundation"
      status: "Complete"
      summary: "Prove the method on 1,400 academic abstracts that cannot lie: a measured BM25 baseline, failure-driven experiments, published rejections, and evidence-gated promotion. Ends at a keyword ceiling, then breaks it with embeddings."
    - key: "phase-2"
      title: "Phase 2 — Cross-Domain Validation with BEIR"
      status: "In progress"
      summary: "Run every Phase 1 technique across fifteen public BEIR datasets spanning science, finance, argument retrieval, fact-checking, and web search. Nothing is discarded — each technique is classified Universal, Domain-conditional, or Dormant, and travels on with its evidence map."
    - key: "phase-3"
      title: "Phase 3 — Retail Relevance with Amazon ESCI"
      status: "Planned"
      summary: "Documents become products. Titles, brands, colors, attributes, and hard constraints, evaluated against real relevance labels where the substitute is sometimes the better answer."
    - key: "phase-4"
      title: "Phase 4 — Behavioral Retail Search"
      status: "Planned"
      summary: "Add the one thing academic data cannot provide: customers. Clicks, add-to-cart, and purchases as ranking signals — and a decision on whether they justify a learned ranking layer."
  themes:
    - "Retail search"
    - "AI agents"
    - "Mission-driven engineering"
    - "Search relevance"
    - "Learning-to-rank"
    - "Search evaluation"
  questions:
    - "Why is retail search a multi-objective ranking problem?"
    - "Can AI agents improve search quality through measured experiments?"
    - "What happens when search architecture emerges from business goals instead of being prescribed upfront?"
    - "How should query understanding, synonyms, normalization, indexing, ranking, and evaluation work together?"

